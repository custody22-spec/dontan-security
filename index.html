<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합경비 구축현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fa;--surface:#fff;--surface2:#f0f2f7;--accent:#4f8ef7;--green:#3ecf8e;--orange:#f7874f;--amber:#f7c94f;--text:#1a1d2e;--muted:#6b7280;--border:#e2e6f0}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700}
header .sub{font-size:11px;color:var(--muted);margin-top:2px}
header .upd{font-size:10px;color:var(--muted);margin-top:3px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:11px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:16px;max-width:860px;margin:0 auto}
.sc{display:none}.sc.on{display:block}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.scard .n{font-size:28px;font-weight:800;line-height:1}
.scard .l{font-size:11px;color:var(--muted);margin-top:4px}
.n.g{color:var(--green)}.n.b{color:var(--accent)}.n.a{color:var(--orange)}
.ov{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.ovt{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px}
.tr{height:9px;background:var(--border);border-radius:99px;overflow:hidden}
.fi{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green))}
.sl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin:14px 0 8px;text-transform:uppercase}
.pr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px}
.prt{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prn{font-size:14px;font-weight:700}
.prr{display:flex;align-items:center;gap:8px}
.bg{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.bgd{background:rgba(62,207,142,.15);color:#1a9e6e}
.bgi{background:rgba(79,142,247,.15);color:#3375d4}
.bgw{background:rgba(122,127,153,.15);color:#6b7280}
.pt{font-size:12px;color:var(--muted)}
.mt{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:8px}
.mf{height:100%;border-radius:99px;background:var(--accent)}
.mf.d{background:var(--green)}
.dt{display:flex;gap:6px;flex-wrap:wrap}
.dtg{font-size:11px;color:var(--muted);background:var(--surface2);border-radius:5px;padding:2px 8px}
.vc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.vn{font-size:14px;font-weight:700}
.vp{font-size:12px;color:var(--muted);margin-top:2px}
.vb{background:rgba(62,207,142,.15);color:#1a9e6e;border:1px solid rgba(62,207,142,.3);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:700;text-decoration:none}
.fl{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.fs{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.fs:last-child{margin-bottom:0}
.fn{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fd{font-size:13px;line-height:1.5;color:var(--muted)}
.fd b{color:var(--text)}
.rb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;font-size:13px;line-height:1.9;white-space:pre-wrap}
.cb{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer}
.cb:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>🛡️ 통합경비 구축현황</h1>
  <div class="sub">동탄역시범 한화꿈에그린 프레스티지</div>
  <div class="upd">기준일: 2026.06.24</div>
</header>
<div class="tabs">
  <div class="tab on" onclick="sw('d',this)">📊 대시보드</div>
  <div class="tab" onclick="sw('v',this)">📞 업체</div>
  <div class="tab" onclick="sw('p',this)">📷 사진</div>
  <div class="tab" onclick="sw('r',this)">📋 일일보고</div>
</div>
<div class="main">

<div class="sc on" id="x-d">
  <div class="sg">
    <div class="scard"><div class="n g" id="cnt-done">-</div><div class="l">완료</div></div>
    <div class="scard"><div class="n b" id="cnt-ing">-</div><div class="l">진행중</div></div>
    <div class="scard"><div class="n a" id="cnt-wait">-</div><div class="l">예정</div></div>
  </div>
  <div class="ov"><div class="ovt"><span style="font-weight:700">전체 완료율</span><span style="color:var(--green);font-weight:800" id="pct">-</span></div><div class="tr"><div class="fi" id="fill" style="width:0%"></div></div></div>
  <div class="sl">공정별 현황</div>
  <div id="proc-list"></div>
</div>

<div class="sc" id="x-v"><div id="vendor-list"></div></div>

<div class="sc" id="x-p">
  <div class="sl">사진 올리는 법</div>
  <div class="fl">
    <div class="fs"><div class="fn">1</div><div class="fd"><b>카톡 화면 캡처</b><br>사진+메모 보이는 화면 그대로</div></div>
    <div class="fs"><div class="fn">2</div><div class="fd"><b>관리소장에게 전달</b><br>소장이 분석·정리해서 노션 저장</div></div>
    <div class="fs"><div class="fn">3</div><div class="fd"><b>이 화면에 자동 반영</b><br>완료</div></div>
  </div>
</div>

<div class="sc" id="x-r">
  <div class="sl">오늘 일일보고 — 2026.06.24</div>
  <div class="rb" id="report-text"></div>
  <button class="cb" onclick="copyReport()">📋 복사 → 카톡 붙여넣기</button>
</div>

</div>

<script>
const PROC = [
  {name:"CCTV", status:"진행중", pct:70, vendor:"SK쉴더스", note:"지상외곽 등 설치완료, 7월 셋팅·보완", qty:"639EA"},
  {name:"주차관제시스템", status:"완료", pct:100, vendor:"아마노코리아", note:"", qty:"12EA"},
  {name:"경관조명", status:"진행중", pct:80, vendor:"남효A&A", note:"기본 점등완료, 추가요청분 진행", qty:"1식"},
  {name:"스피드게이트", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"2LANE"},
  {name:"원패스시스템", status:"완료", pct:100, vendor:"다산카이스", note:"21EA 증가", qty:"114EA"},
  {name:"키즈룸", status:"진행중", pct:90, vendor:"알에프지", note:"안전성검사 회신 후 OPEN, 사후확인 필요", qty:"1식"},
  {name:"커뮤니티출입통제", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"-"},
  {name:"방재실·관제소 모니터", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"-"},
  {name:"순찰관리시스템", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"-"},
  {name:"경비원 바디캠", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"-"},
  {name:"비상벨", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"-"},
  {name:"근태관리시스템", status:"완료", pct:100, vendor:"SK쉴더스", note:"", qty:"-"},
  {name:"커뮤니티 KIOSK", status:"완료", pct:100, vendor:"TPM", note:"", qty:"-"},
  {name:"순찰용 전기자전거", status:"완료", pct:100, vendor:"-", note:"", qty:"-"},
  {name:"수하물 전기오토바이", status:"완료", pct:100, vendor:"-", note:"", qty:"-"},
  {name:"입주민구호물품", status:"완료", pct:100, vendor:"-", note:"", qty:"-"},
  {name:"경비초소 간판·로고", status:"완료", pct:100, vendor:"-", note:"", qty:"-"},
  {name:"입주민APP", status:"진행중", pct:60, vendor:"트러스테이", note:"데이터 이관 별도 진행", qty:"-"}
];
const VENDORS = [
  {cat:"CCTV·스피드게이트·통합경비", name:"SK쉴더스", person:"-", phone:""},
  {cat:"주차관제", name:"아마노코리아", person:"-", phone:""},
  {cat:"경관조명", name:"남효에이앤에이", person:"-", phone:""},
  {cat:"원패스시스템", name:"다산카이스", person:"-", phone:""},
  {cat:"키즈룸", name:"알에프지", person:"-", phone:""},
  {cat:"커뮤니티 KIOSK", name:"TPM", person:"-", phone:""},
  {cat:"입주민APP", name:"트러스테이", person:"-", phone:""},
  {cat:"기타", name:"SK네트웍스", person:"-", phone:""},
  {cat:"기타", name:"엔에스게이트", person:"-", phone:""}
];

function sw(id,el){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('x-'+id).classList.add('on');
  el.classList.add('on');
}

function render(){
  const done=PROC.filter(p=>p.status==='완료').length;
  const ing=PROC.filter(p=>p.status==='진행중').length;
  const wait=PROC.filter(p=>p.status==='예정').length;
  const pct=Math.round(done/PROC.length*100);
  document.getElementById('cnt-done').textContent=done;
  document.getElementById('cnt-ing').textContent=ing;
  document.getElementById('cnt-wait').textContent=wait;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('fill').style.width=pct+'%';

  let h='';
  PROC.forEach(p=>{
    const bc=p.status==='완료'?'bgd':p.status==='진행중'?'bgi':'bgw';
    const fc=p.status==='완료'?'d':'';
    h+=`<div class="pr"><div class="prt"><span class="prn">${p.name}</span><div class="prr"><span class="pt">${p.pct}%</span><span class="bg ${bc}">${p.status}</span></div></div><div class="mt"><div class="mf ${fc}" style="width:${p.pct}%"></div></div><div class="dt">${p.vendor!=='-'?`<span class="dtg">${p.vendor}</span>`:''}${p.qty!=='-'?`<span class="dtg">${p.qty}</span>`:''}${p.note?`<span class="dtg">${p.note}</span>`:''}</div></div>`;
  });
  document.getElementById('proc-list').innerHTML=h;

  let v='';
  const groups={};
  VENDORS.forEach(x=>{if(!groups[x.cat])groups[x.cat]=[];groups[x.cat].push(x);});
  Object.entries(groups).forEach(([cat,vs])=>{
    v+=`<div class="sl">${cat}</div>`;
    vs.forEach(x=>{
      v+=`<div class="vc"><div><div class="vn">${x.name}</div><div class="vp">${x.person} ${x.phone||''}</div></div>${x.phone?`<a class="vb" href="tel:${x.phone}">📞 전화</a>`:''}</div>`;
    });
  });
  document.getElementById('vendor-list').innerHTML=v;

  const doneList=PROC.filter(p=>p.status==='완료').slice(0,3).map(p=>'· '+p.name).join('\n');
  const ingList=PROC.filter(p=>p.status==='진행중').map(p=>`· ${p.name} (${p.pct}%)${p.note?' - '+p.note:''}`).join('\n');
  const report=`📋 통합경비 구축 일일보고\n일시: 2026.06.24 (수)\n\n📊 전체 진행: ${pct}% (완료 ${done} / 진행중 ${ing} / 예정 ${wait})\n\n✅ 완료 (주요)\n${doneList}\n\n🔧 진행중\n${ingList}\n\n⚠ 특이사항\n· 없음`;
  document.getElementById('report-text').textContent=report;
}

function copyReport(){
  const t=document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.querySelector('.cb');b.textContent='✅ 복사됨!';
    setTimeout(()=>b.textContent='📋 복사 → 카톡 붙여넣기',2000);
  });
}
render();
</script>
</body>
</html>
